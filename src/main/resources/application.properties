spring.application.name=prasthanam-tours-backend
spring.data.mongodb.uri=${MONGODB_URI}
server.port=${PORT:8081}

logging.level.org.mongodb.driver=INFO
logging.level.org.springframework.data.mongodb=INFO

# --- Admin auth (set these as environment variables, never commit real values) ---
admin.username=${ADMIN_USERNAME}
# BCrypt hash of the admin password - generate with GeneratePasswordHashTest (see below)
admin.password-hash=${ADMIN_PASSWORD_HASH}

# --- JWT ---
# Base64-encoded secret, at least 32 bytes. Generate with: openssl rand -base64 32
jwt.secret=${JWT_SECRET}
# Token validity in ms - default 7 days
jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}